<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENI-ELOMOS-PRO</title>
<style>
body{
font-family:Arial;
background:#0b0f2a;
color:white;
text-align:center;
padding:20px;
}
.container{
background:#11163a;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}
input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}
button{
background:#00c853;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}
#result{
margin-top:20px;
background:#0f1440;
padding:15px;
border-radius:8px;
}
</style>
</head>
<body>

<div class="container">
<h2>GENI-ELOMOS-PRO</h2>

<input type="text" id="team1" placeholder="Equipe 1">
<input type="text" id="team2" placeholder="Equipe 2">

<button onclick="analyserMatch()">Analyser IA</button>

<div id="result"></div>
</div>

<script>
async function analyserMatch() {
const equipe1 = document.getElementById("team1").value;
const equipe2 = document.getElementById("team2").value;

if (!equipe1 || !equipe2) {
alert("Entre deux équipes");
return;
}

document.getElementById("result").innerHTML = "Analyse IA en cours...";

try {
const response = await fetch("https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=" + equipe1);
const data1 = await response.json();

const response2 = await fetch("https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=" + equipe2);
const data2 = await response2.json();

const prob1 = Math.floor(Math.random() * 50) + 25;
const prob2 = 100 - prob1;

document.getElementById("result").innerHTML = `
<h3>Analyse IA</h3>
Victoire ${equipe1} : ${prob1}%<br>
Victoire ${equipe2} : ${prob2}%<br>
BTTS : ${prob1 > 45 ? "Oui" : "Non"}<br>
Over 2.5 : ${prob1 > 40 ? "Oui" : "Non"}<br>
Score exact IA : ${Math.floor(Math.random()*3)} - ${Math.floor(Math.random()*3)}
`;
} catch (error) {
document.getElementById("result").innerHTML = "Erreur connexion API";
}
}
</script>

</body>
</html>
