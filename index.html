<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prédictions IA</title>
<style>
body {font-family: Arial; padding:20px; background:#0b0f1a; color:white;}
input,button {padding:10px; margin:5px; width:100%; border-radius:8px; border:none;}
button {background:#00c853; color:white; font-weight:bold;}
#result {margin-top:20px; background:#11182a; padding:15px; border-radius:10px;}
</style>
</head>
<body>

<h2>Prédictions Match IA</h2>

<input type="text" id="team1" placeholder="Equipe 1">
<input type="text" id="team2" placeholder="Equipe 2">

<button onclick="analyserMatch()">Analyser</button>

<div id="result"></div>

<script>
function analyserMatch() {
const equipe1 = document.getElementById("team1").value.trim();
const equipe2 = document.getElementById("team2").value.trim();

if (!equipe1 || !equipe2) {
alert("Entre deux équipes");
return;
}

const prob1 = Math.floor(Math.random() * 50) + 25;
const prob2 = 100 - prob1;

const mtfin = ["1-1","1-X","X-1","2-2","2-X","X-2"];
const choix = mtfin[Math.floor(Math.random()*mtfin.length)];

document.getElementById("result").innerHTML =
"<h3>Prédictions IA</h3>" +
"Victoire " + equipe1 + " : " + prob1 + "%<br>" +
"Victoire " + equipe2 + " : " + prob2 + "%<br>" +
"1X : Oui<br>" +
"X2 : Oui<br>" +
"X : " + (prob1>48?"Non":"Possible") + "<br>" +
"MT-Fin : " + choix + "<br>" +
"BTTS : " + (prob1 > 45 ? "Oui" : "Non") + "<br>" +
"Over 1.5 : Oui<br>" +
"Over 2.5 : " + (prob1 > 40 ? "Oui" : "Non") + "<br>" +
"Corners : " + (Math.floor(Math.random()*6)+7) + "<br>" +
"Cartons : " + (Math.floor(Math.random()*4)+3) + "<br>" +
"Score exact IA : " + Math.floor(Math.random()*3) + " - " + Math.floor(Math.random()*3);
}
</script>

</body>
</html>
