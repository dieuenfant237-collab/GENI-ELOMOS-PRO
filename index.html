<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENI ELOMOS PRO</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#3a0ca3,#f72585,#ff5400);color:white;padding:20px}
.watermark{position:fixed;bottom:10px;right:10px;opacity:0.25;font-size:22px;font-weight:bold;color:red}
.card{background:rgba(0,0,0,0.4);padding:15px;border-radius:15px;margin-top:15px;backdrop-filter:blur(5px)}
select,input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;font-size:16px}
button{background:linear-gradient(90deg,#ff0000,#ff7300);color:white;font-weight:bold}
#result{margin-top:15px;font-weight:bold}
</style>
</head>
<body>
<h2>GENI ELOMOS PRO</h2>
<div class="card">
<select id="sport">
<option>Football</option>
<option>Basketball</option>
<option>Tennis</option>
</select>
<input type="text" id="match" placeholder="Equipe A vs Equipe B">
<button onclick="predict()">PREDIRE</button>
<div id="result"></div>
</div>
<div class="watermark">GENI ELOMOS PRO</div>
<script>
function predict(){
var match=document.getElementById("match").value;
if(match==""){document.getElementById("result").innerHTML="Entrer les équipes";return;}
var teams=match.split("vs");
var teamA=teams[0]?teams[0].trim():"Equipe A";
var teamB=teams[1]?teams[1].trim():"Equipe B";
var forceA=Math.floor(Math.random()*5)+1;
var forceB=Math.floor(Math.random()*5)+1;
var scoreA=forceA>forceB?Math.floor(Math.random()*2)+1:Math.floor(Math.random()*2);
var scoreB=forceB>forceA?Math.floor(Math.random()*2)+1:Math.floor(Math.random()*2);
var corners=Math.floor(Math.random()*5)+7;
var over=(scoreA+scoreB)>2?"Oui":"Non";
var btts=(scoreA>0 && scoreB>0)?"Oui":"Non";
document.getElementById("result").innerHTML=
teamA+" "+scoreA+" - "+scoreB+" "+teamB+"<br>"+
"Over 2.5: "+over+"<br>"+
"BTTS: "+btts+"<br>"+
"Corners: "+corners;
}
</script>
</body>
</html>
